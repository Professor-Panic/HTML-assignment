<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <style>
            .main {
        background: linear-gradient(135deg, #0f0f14, #1a1a2e);
        width: 99%;
        height: 99%;
        position: absolute;
    }

    .box {
        width: 30%;
        height: 65%;
        color: #f5f5f5;
        border-radius: 14px;
        background: linear-gradient(145deg, #2b2d42, #3a3f5c);
        position: relative;
        top: 15%;
        left: 33%;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .card_text {
        position: relative;
        top: 5%;
        left: 20%;
        color: #eaeaea;
    }

    input {
        width: 200px;
        height: 20px;
        color: #ffffff;
        background-color: #121212;
        border: 1px solid #2f2f3a;
        border-radius: 12px;
        padding: 8px;
    }

    input::placeholder {
        color: #9aa0a6;
    }

    .login {
        width: 200px;
        height: 40px;
        background: linear-gradient(135deg, #6c63ff, #4dd0e1);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        font-weight: bold;
    }
        </style>
    </head>
    <body>
        <div class="main">
        <div class="box">
            <div class="card_text">
                <form>
                    <br>
                    <label for="Name"></label>
                    <input type="text" name="Name" placeholder="Name">
                    <br>
                    <br>
                    <label for="Email"></label>
                    <input type="email" name="Email"placeholder="Email">
                    <br>
                    <br>
                    <label for="Password"></label>
                    <input type="password" name="Password"placeholder="Password">
                    <br>
                    <br>
                    <label for="birth_date"></label>     
                    <input type="date"name="birth_date"placeholder="Date of Birth">
                    <br>
                    <br>
                    <label for="Passport"></label>
                    <input type="number"name="Passport"placeholder="Passport Number">
                    <br>
                    <br>
                    <div class="login">
                    <a href="next.html">Login</a>
                    <br>
                    </div>
                </form>
            </div>
        </div>
        </div>
    </body>
</html>
